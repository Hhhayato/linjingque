<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f0e8;
  font-family: 'Ma Shan Zheng', serif;
  color: #1a1208;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,140,60,0.07) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,140,60,0.07) 40px);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

.header { text-align: center; padding-bottom: 24px; }
.header-line {
  display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 6px;
}
.header-line::before, .header-line::after {
  content: ''; flex: 1; max-width: 200px; height: 1px;
  background: linear-gradient(to right, transparent, #c8a040, transparent);
}
.header h1 {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: clamp(20px, 3.5vw, 40px);
  color: #1a1208;
  letter-spacing: 5px;
  white-space: nowrap;
}
.header-accent { color: #c8a040; }
.header-sub { font-size: 13px; color: #9a7830; letter-spacing: 6px; margin-top: 6px; }
.header-divider {
  width: 50%; height: 1px; margin: 10px auto 0;
  background: linear-gradient(to right, transparent, rgba(200,160,64,0.4), transparent);
}

.main {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 24px;
  margin-top: 24px;
}

.map-label { font-size: 13px; color: #c8a040; letter-spacing: 5px; text-align: center; margin-bottom: 10px; }

#mapSvg {
  width: 100%;
  height: clamp(280px, 40vw, 460px);
  border: 1px solid rgba(180,140,60,0.35);
  background: #1a1a14;
  cursor: crosshair;
  display: block;
  border-radius: 2px;
}

.map-hint { font-size: 11px; color: #a89060; text-align: center; margin-top: 6px; letter-spacing: 2px; }

.sidebar { display: flex; flex-direction: column; }

.panel {
  background: #fff;
  border: 1px solid rgba(180,140,60,0.35);
  border-radius: 2px;
  padding: 20px 18px;
  position: relative;
}
.panel::after {
  content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
  border: 1px solid rgba(180,140,60,0.1); border-radius: 2px; pointer-events: none;
}
.panel-title {
  font-family: 'ZCOOL XiaoWei', serif;
  font-size: 18px; color: #1a1208; letter-spacing: 5px; text-align: center;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(180,140,60,0.2);

.field-wrap { margin-bottom: 12px; }
.field-label { display: block; font-size: 11px; color: #9a7830; letter-spacing: 3px; margin-bottom: 5px; }

input, textarea {
  width: 100%;
  background: #faf7f0;
  border: 1px solid rgba(180,140,60,0.3);
  border-radius: 2px;
  color: #1a1208;
  font-family: 'Ma Shan Zheng', serif;
  font-size: 14px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;

input:focus, textarea:focus {
  border-color: #c8a040;
  box-shadow: 0 0 0 3px rgba(200,160,64,0.1);

textarea { height: 70px; }

#coordHint { font-size: 10px; color: #a89060; text-align: center; min-height: 16px; letter-spacing: 1px; margin-bottom: 6px; }

.btn-row { display: flex; gap: 8px; margin-top: 4px; }
.btn {
  flex: 1;
  background: #1a1208; border: 1px solid #1a1208; color: #f5e8b0;
  font-family: 'Ma Shan Zheng', serif; font-size: 14px; letter-spacing: 3px;

.btn:hover { background: #3a2a10; border-color: #3a2a10; }
.btn:disabled { opacity: 0.6; cursor: default; }
.btn.ghost {

@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.wall-card-name { font-family: 'ZCOOL XiaoWei', serif; font-size: 15px; color: #1a1208; letter-spacing: 2px; margin-bottom: 2px; }
.wall-card-city { font-size: 11px; color: #c8a040; letter-spacing: 2px; margin-bottom: 8px; }

.wall-card-msg::before { content: '\201C'; color: #c8a040; font-size: 18px; vertical-align: -3px; margin-right: 1px; }
.wall-card-msg::after  { content: '\201D'; color: #c8a040; font-size: 18px; vertical-align: -3px; margin-left: 1px; }
.wall-empty { text-align: center; color: #9a7830; font-size: 14px; letter-spacing: 4px; padding: 40px 0; grid-column: 1/-1; }

#tooltip {

async function dbFetch(path, opts={}) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers: H, ...opts });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

  try { markers = await dbFetch('markers?select=*&order=created_at.asc&limit=800') || []; }

  renderMarkers(); renderWall();

const svg = d3.select('#mapSvg');
const proj = d3.geoNaturalEarth1().scale(153).translate([450,235]);
const geoPath = d3.geoPath().projection(proj);

svg.on('click', function(ev) {
  const [mx,my] = d3.pointer(ev);
  const c = proj.invert([mx,my]);
  if (!c || isNaN(c[0])) return;
  selectedCoord = {lon:c[0], lat:c[1]};
  document.getElementById('coordHint').textContent =
    `已选：${c[0]>=0?'东经':'西经'}${Math.abs(c[0]).toFixed(1)}° · ${c[1]>=0?'北纬':'南纬'}${Math.abs(c[1]).toFixed(1)}°`;
  if (tempMark) tempMark.remove();
  tempMark = svg.append('g').attr('transform',`translate(${mx},${my})`);
  tempMark.append('circle').attr('r',9).attr('fill','rgba(200,160,64,0.2)');
  tempMark.append('circle').attr('r',3.5).attr('fill','#c8a040').attr('opacity',0.95);
});

function renderMarkers() {
  svg.selectAll('.mk').remove();
  markers.forEach((m,i) => {
    const p = proj([m.lon, m.lat]); if (!p) return;
    const g = svg.append('g').attr('class','mk').attr('transform',`translate(${p[0]},${p[1]})`);
    g.append('circle').attr('r',16).attr('class','pulse').attr('fill','rgba(200,160,64,0)');
    g.append('circle').attr('r',7).attr('fill','rgba(200,160,64,0.2)');
    g.append('circle').attr('r',3.5).attr('fill','#c8a040').attr('opacity',0.9);
    g.append('circle').attr('r',1.5).attr('fill','#fff8e0');
    g.style('cursor','pointer');
    g.on('mouseover',(ev)=>showTip(ev,m)).on('mousemove',(ev)=>moveTip(ev)).on('mouseout',hideTip);
  });
  svg.selectAll('.pulse').each(function(_,i){
    const el=d3.select(this), delay=(i*90)%900;
    (function go(){ el.attr('r',5).attr('opacity',0.6).transition().duration(1500).delay(delay).attr('r',22).attr('opacity',0).on('end',go); })();
  });
}

function renderWall() {
  const grid = document.getElementById('wallGrid');
  const count = document.getElementById('wallCount');
  if (!markers.length) {
    count.textContent = '尚无游侠留名';
    grid.innerHTML = '<div class="wall-empty">快来留下第一个祝福吧</div>';
    return;

  count.textContent = `已有 ${markers.length} 位侠士留下祝福`;

      ${m.msg?`<div class="wall-card-msg">${esc(m.msg)}</div>`:''}
    </div>`
  ).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const tip = document.getElementById('tooltip');

function moveTip(ev){ tip.style.left=(ev.clientX+14)+'px'; tip.style.top=(ev.clientY-10)+'px'; }

const geoCache = {};

async function geocodeCity(name) {
  if (!name) return null;
  const trimmed = name.trim();
  const key = trimmed.toLowerCase();

  // 1. 内置表（最快最稳，中国城市全覆盖）
  const localMatch = Object.keys(CN_CITIES).find(k => k === trimmed || k.toLowerCase() === key);
  if (localMatch) return CN_CITIES[localMatch];

  // 2. 缓存
  if (geoCache[key]) return geoCache[key];

  // 3. Nominatim
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(trimmed)}&format=json&limit=1`, { headers: { 'User-Agent': 'birthday-map/1.0' } });
    const data = await r.json();
    if (data && data.length > 0) {
      const result = [parseFloat(data[0].lon), parseFloat(data[0].lat)];
      geoCache[key] = result; return result;
    }
  } catch(e) { console.warn('Nominatim failed', e); }

  return null;
}

async function submitMarker(){

  if(!name){showToast('请留下大侠名号');return;}
  if(!city&&!selectedCoord){showToast('请输入城邑或点击地图选取坐标');return;}
  let lon,lat;
  const btn=document.getElementById('submitBtn');
  btn.textContent='寻访此地…'; btn.disabled=true;
  try{
    if(selectedCoord){
      lon=selectedCoord.lon; lat=selectedCoord.lat;
    } else {
      const c = await geocodeCity(city);
      if(!c){ showToast('未能寻得此城邑，请换一个写法或点击地图选取'); btn.textContent='点亮此地'; btn.disabled=false; return; }
      [lon,lat]=c;
    }
    const nm={name,city:city||'未知',msg,lon,lat};
    await dbFetch('markers',{method:'POST',body:JSON.stringify(nm)});
    markers.push(nm); renderMarkers(); renderWall(); clearForm(); showToast('烽火点亮，天下皆知');
  }catch(e){console.error(e);showToast('连接失败，请检查 Supabase 配置');}
  finally{btn.textContent='点亮此地';btn.disabled=false;}
}

function clearForm(){
  ['nameInput','cityInput','msgInput'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('coordHint').textContent='';
  selectedCoord=null; if(tempMark){tempMark.remove();tempMark=null;}
}

let tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block'; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(tt); tt=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(-10px)';setTimeout(()=>t.style.display='none',300);},2500);
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json())
  .then(world=>{
    const countries=topojson.feature(world,world.objects.countries);
    const graticule=d3.geoGraticule();
    svg.append('rect').attr('width',900).attr('height',450).attr('fill','#1a1a14');
    svg.append('path').datum(graticule()).attr('d',geoPath).attr('fill','none').attr('stroke','rgba(200,160,64,0.08)').attr('stroke-width',0.5);
    svg.append('path').datum({type:'Sphere'}).attr('d',geoPath).attr('fill','none').attr('stroke','rgba(200,160,64,0.3)').attr('stroke-width',1);
    svg.selectAll('.land').data(countries.features).enter().append('path').attr('class','land').attr('d',geoPath)
      .attr('fill','#2e2e22').attr('stroke','rgba(200,160,64,0.35)').attr('stroke-width',0.5);
    loadMarkers();
  })
  .catch(()=>{
    svg.append('rect').attr('width',900).attr('height',450).attr('fill','#1a1a14');
    svg.append('text').attr('x',450).attr('y',225).attr('text-anchor','middle').attr('fill','#6a5030').attr('font-size',14).attr('font-family','serif').text('地图加载中，请稍候…');
    loadMarkers();
  });
</script>
